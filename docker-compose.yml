version: "3.9"

services:
  db:
    image: postgres:16
    container_name: test_for_work_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_for_work
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: test_for_work_app
    depends_on:
      - db
    ports:
      - "8085:8080"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: test_for_work
      DB_PORT: 5432

volumes:
  postgres_data: